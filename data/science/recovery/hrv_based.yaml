id: hrv_based
pillar: recovery
name: "HRV-Based Recovery"
author: system
description: >
  A Praxys operational adaptation informed by Plews et al. (2012) ln(RMSSD)
  monitoring and Kiviniemi et al. (2007) individualized HRV-guided training.
  The status bands and 10% CV caution threshold are product guardrails, not
  study-validated diagnostic cutoffs.
simple_description: >
  Compares a current ln(RMSSD) reading with your prior valid observations to
  provide a conservative coaching status. Current HRV is excluded from its own
  baseline, and stale or insufficient HRV produces no recovery classification.
advanced_description: |
  ## HRV-Based Recovery Assessment

  **Primary signal: ln(RMSSD)**
  - Log-transformed nocturnal RMSSD from wearable data
  - Compared with prior valid observations from the preceding 30 calendar days; the current reading is excluded from its own baseline
  - Requires at least 7 prior valid observations under the default 7-observation rolling window

  **Praxys operational status bands:**
  | Condition | Status | Basis |
  |-----------|--------|-------|
  | ln(RMSSD) > mean + 0.5 SD | Fresh | Praxys upper reference band informed by Plews-style change monitoring |
  | mean - 1 SD <= ln(RMSSD) <= mean + 0.5 SD | Normal | Between Praxys reference bands |
  | ln(RMSSD) < mean - 1 SD | Fatigued | Praxys lower caution band informed by individualized HRV-guided training |
  | Fewer than 7 prior readings, no current value, HRV older than yesterday, or zero baseline variance | No Data | Cannot form a reliable same-day recovery band |

  These exact bands are a Praxys product adaptation. Plews et al. studied
  ln(RMSSD) trend and variability monitoring; Kiviniemi et al. studied an
  individualized HRV-guided protocol using a different HRV measure. Neither
  paper validates these labels as a diagnosis.

  **Trend monitoring:**
  - 7-observation rolling mean of ln(RMSSD): a decline triggers conservative coaching caution, not a conclusion of maladaptation
  - 7-observation coefficient of variation (CV): CV > 10% is a Praxys caution flag for unusual variability, not a diagnosis

  **Availability policy:**
  - Classification requires HRV recorded today or yesterday.
  - Sleep, readiness, and resting HR remain separate informational context.
  - No current HRV means no HRV-based recovery adjustment.
  - Identical historical values have zero estimated dispersion, so Praxys reports No Data rather than inventing a reference band.

