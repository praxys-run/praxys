id: banister_ultra
pillar: load
name: Banister 超长距离版
author: system
description: >
  适用于超长距离运动员（50K+）的产品化调整。采用更长的长期与短期负荷窗口（50/10 天），
  并扩大近期负荷占优区间。这些是面向高训练量山地训练的 Praxys 估计，不是经过验证的
  生理阈值。
simple_description: >
  专为长时间山地训练设计。模型比较约 7 周的长期训练负荷与约 10 天的近期训练负荷。
  更宽的负 TSB 区间用于容纳持续高训练量周期，但不能直接测量疲劳、恢复、准备度或
  受伤风险。
advanced_description: |
  ## Banister 超长距离版适配

  面向超长距离运动员调整的时间常数：
  - **CTL** tau = 50 天（标准 PMC 为 42 天）
  - **ATL** tau = 10 天（标准 PMC 为 7 天）

  **更宽的近期负荷占优区间：** -35 至 -10（标准为 -25 至 -10）。该区间描述超长训练
  周期中短期模型负荷持续高于长期模型负荷的情况。区间边界和每日 TSB 阈值均为产品估计，
  不是诊断、恢复、准备度或受伤风险阈值。

  **诊断调整：**
  - 工作分段过滤器扩展至 **3600 秒**（原为 1800 秒），用于捕捉山地超跑中的长时间持续爬升
  - 里程阈值提高：**80 公里/周** = 强，**60 公里/周** = 中等（标准为 60/40）

  3600 秒和 80/60 公里阈值是参考超长距离训练实践制定的 Praxys 运营启发式规则，
  不是已发表研究验证过的切点。

  **参考文献：**
  - Banister (1975) "A systems model of training for athletic performance"
  - Koop (2016) *Training Essentials for Ultrarunning*
