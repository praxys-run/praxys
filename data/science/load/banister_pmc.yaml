id: banister_pmc
pillar: load
name: "Banister PMC"
author: system
description: >
  Industry-standard Performance Management Chart. CTL models longer-term training
  load, ATL models shorter-term training load, and TSB = CTL - ATL. TSB is a load
  balance estimate, not a direct measure of fatigue, recovery, readiness, or injury risk.
simple_description: >
  Your dashboard compares a 6-week model of training load with a 1-week model of
  recent load. Their difference estimates load balance: positive values mean the
  longer-term model is higher, while negative values mean recent modeled load is
  higher. This does not establish how recovered or ready you are today.
advanced_description: |
  ## Banister Performance Management Chart

  **Exponentially Weighted Moving Averages (EWMA):**
  - **CTL** (Chronic Training Load) = EWMA(daily_load, alpha = 1/42)
  - **ATL** (Acute Training Load) = EWMA(daily_load, alpha = 1/7)
  - **TSB** (Training Stress Balance) = CTL - ATL

  Industry interfaces often nickname CTL "fitness," ATL "fatigue," and TSB "form."
  Those are model labels, not direct physiological measurements. The smoothing
  constant alpha = 1/tau follows the convention used by TrainingPeaks, Stryd, and
  Intervals.icu. Time constants of 42 and 7 days are nominal approximations of
  Banister's original long-term and short-term ranges.

  **Operational TSB bands:**
  | Band | TSB Range | Load-model interpretation |
  |------|-----------|---------------------------|
  | High positive | 5 to 25 | Longer-term modeled load exceeds recent modeled load |
  | Near balance | -10 to 5 | Long-term and recent modeled loads are relatively close |
  | Recent-load dominant | -25 to -10 | Recent modeled load exceeds longer-term modeled load |
  | Strong recent-load dominance | < -25 | Recent modeled load is substantially higher; apply coaching caution |

  The work-split and weekly-volume diagnosis cutoffs are also Praxys operational
  heuristics; they are not outputs validated by the Banister model.

  These bands and the daily coaching cutoff are Praxys operational estimates informed
  by PMC conventions. They are not validated universal recovery, readiness,
  performance, or injury-risk thresholds.

  **References:**
  - Banister (1975) "A systems model of training for athletic performance"
  - Banister (1991) "Modeling elite athletic performance," source of the
    exponential k-weighted TRIMP (k_male 1.92, k_female 1.67)
  - Morton, Fitz-Clarke & Banister (1990) "Modeling human performance in
    running," impulse-response model that consumes TRIMP
  - TrainingPeaks, "The Science of the Performance Manager"
