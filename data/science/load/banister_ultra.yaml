id: banister_ultra
pillar: load
name: "Banister Ultra"
author: system
description: >
  Product adaptation for ultra-distance athletes (50K+). It uses longer long-term
  and short-term load windows (50/10 days) plus a wider recent-load-dominant band.
  These are Praxys estimates for high-volume mountain training, not validated
  physiological thresholds.
simple_description: >
  Designed for ultra runners doing long mountain sessions. It compares a 7-week
  model of training load with a 10-day model of recent load. The wider negative TSB
  band accommodates sustained high-volume blocks, but it does not measure fatigue,
  recovery, readiness, or injury risk directly.
advanced_description: |
  ## Banister Ultra Adaptation

  Modified time constants for ultra-distance athletes:
  - **CTL** tau = 50 days (vs 42 in standard PMC)
  - **ATL** tau = 10 days (vs 7 in standard PMC)

  **Wider recent-load-dominant band:** -35 to -10 (vs -25 to -10 in standard).
  This models periods where short-term load remains above longer-term load during
  ultra training blocks. The boundary and daily TSB cutoff are product estimates,
  not diagnostic, recovery, readiness, or injury-risk thresholds.

  **Diagnosis adjustments:**
  - Work split filter extended to **3600 seconds** (vs 1800s) to capture long
    sustained climbs typical in mountain ultras
  - Volume thresholds raised: **80 km/week** = strong, **60 km/week** = moderate
    (vs 60/40 in standard)

  The 3600-second and 80/60 km cutoffs are Praxys operational heuristics informed
  by ultra-training practice, not published validated cut points.

  **References:**
  - Banister (1975) "A systems model of training for athletic performance"
  - Koop (2016) *Training Essentials for Ultrarunning*
citations:
  - key: banister1975
    title: "A systems model of training for athletic performance"
    year: 1975
    journal: "Australian Journal of Sports Medicine"
    url: "https://collection.sl.nsw.gov.au/record/74VvZDVa0D0X"
  - key: koop2016
    title: "Training Essentials for Ultrarunning"
    year: 2016
    type: book
    url: "https://books.google.com/books?id=RgFODAAAQBAJ"

tsb_zones:
  - {min: 25}
  - {min: 5, max: 25}
  - {min: -10, max: 5}
  - {min: -35, max: -10}
  - {max: -35}

params:
  ctl_time_constant: 50
  atl_time_constant: 10
  rss_exponent: 2.0
  trimp_k_male: 1.92
  trimp_k_female: 1.67

signal:
  readiness_rest: 55
  readiness_modify: 65
  tsb_high_fatigue: -25
  hrv_decline_pct: -15

diagnosis:
  work_split_min_sec: 120
  work_split_max_sec: 3600
  volume_strong_km: 80
  volume_moderate_km: 60
