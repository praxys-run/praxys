id: praxys_heat_evidence
pillar: heat
name: "Praxys Heat Acclimatization Evidence"
author: Praxys
description: >
  A fixed Praxys operational model that interprets recent outdoor
  temperature, humidity, and verified running-power evidence against
  heat-acclimatization research. It estimates whether acclimatization to
  similar recent conditions is plausible; it is not a direct physiological
  measurement or a current-weather safety assessment.
simple_description: >
  Uses qualifying outdoor sessions from the latest 14 days to describe the
  temperature and humidity range represented by recent training, then assigns
  a conservative evidence stage. The condition range is most relevant to
  similar conditions and is not an exact personal heat limit.
advanced_description: |
  ## Praxys Heat Acclimatization Evidence

  **What this model answers**

  The model describes the temperature and humidity range represented by
  qualifying running sessions in the latest 14 days and asks whether repeated
  exposure makes acclimatization to similar conditions plausible. It does not
  compare that range with today's weather, estimate a performance penalty, or
  confirm an individual's physiological adaptation.

  **Environmental evidence**

  - Activity-summary air temperature and relative humidity must come from a supported outdoor connector.
  - Relative humidity is converted to a psychrometric wet-bulb proxy with Stull's approximation. This is not WBGT: wind, solar radiation, and within-session weather changes are absent.
  - Praxys applies separate estimated ramps for humid heat (18-26 degrees C wet-bulb proxy) and dry heat (30-40 degrees C air temperature), then uses the stronger ramp rather than adding them.

  **Workload evidence**

  - Timestamped power is preferred when it covers at least 90% of activity duration; activity splits are the fallback.
  - Work must be at or above 50% of current critical power, and the workload provider must match the provider behind critical power.
  - Activity average power is never used because warm-up, cooldown, and recovery can dilute interval intensity.
  - A session is included at 30 effective heat minutes, where effective minutes are work minutes multiplied by the bounded environmental weight.

  **Praxys operational stages**

  | Stage | Evidence interpretation |
  |---|---|
  | Insufficient evidence | No retained prior block and current evidence remains below the general Building threshold |
  | Building | At least 2 qualifying days and 60 effective minutes, or qualifying exposure has resumed after a long gap from a prior block |
  | Likely adapted | At least 7 qualifying days and 420 effective minutes in 14 days |
  | Maintaining | A prior qualifying block remains retained through day 7 after the latest included exposure |
  | Decaying | A prior qualifying block is more than 7 and no more than 28 days past the latest included exposure |

  Typical controlled protocols use about 60-90 minutes per day for 7-14 days,
  but the exact Praxys ramps, effective-minute calculation, stage thresholds,
  and decay labels are product estimates rather than a validated biological
  dose equation.

  **Condition range**

  The displayed range uses only sessions included in the active 14-day
  estimate. An excluded observation cannot widen the range. The range
  describes recent evidence, not the hottest condition an athlete can safely
  tolerate or perform well in. During Maintaining or Decaying, the stage can
  come from an older qualifying block; the displayed range still describes
  only the current 14-day training and must not be read as that older block's
  condition range.

  **Limits and safety**

  Individual responses vary, and the evidence base for female athletes remains
  limited. This model is not medical clearance or a heat-illness risk
  assessment. Stop exercise and begin cooling for heat-illness symptoms; seek
  urgent medical help for confusion, collapse, or altered mental status.
