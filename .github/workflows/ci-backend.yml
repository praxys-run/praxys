name: Backend CI

# Pre-merge validation gate (issues #361 and #377). Runs backend pytest and the
# web production build on every PR targeting main so regressions are caught
# *before* merge — not only by the post-merge deploy workflows. The final
# `backend-tests` aggregator preserves the existing required-check context while
# making both suites load-bearing for autonomously drafted PRs.
#
# Intentionally has NO `paths:` filter. This job is a *required* status check on
# main, and a required check that a path filter skips is reported as permanently
# "pending", which blocks the PR forever. Running both suites on every PR keeps
# the gate always-reporting and protects cross-surface changes.

on:
  pull_request:
    branches: [main]

# One in-flight run per PR; cancel the previous when new commits land.
concurrency:
  group: backend-ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-tests:
    name: python-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest tests/ -v

  web-build:
    name: web-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Build web bundle
        working-directory: web
        run: npm run build

  # Keep this job name stable: branch protection requires `backend-tests`.
  backend-tests:
    name: backend-tests
    if: always()
    needs: [python-tests, web-build]
    runs-on: ubuntu-latest
    steps:
      - name: Require backend tests and web build
        env:
          PYTHON_RESULT: ${{ needs.python-tests.result }}
          WEB_RESULT: ${{ needs.web-build.result }}
        run: |
          set -euo pipefail
          test "$PYTHON_RESULT" = "success"
          test "$WEB_RESULT" = "success"
