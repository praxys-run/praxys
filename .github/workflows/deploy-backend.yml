name: Deploy Backend to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'analysis/**'
      - 'sync/**'
      - 'db/**'
      - 'data/science/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'scripts/appinsights_boundary.sh'
      - '.github/azure-observability.env'
      - '.github/workflows/deploy-backend.yml'
    tags:
      - 'api-*'

permissions:
  id-token: write
  contents: read
  actions: read

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Load observability resource names
        shell: bash
        run: cat .github/azure-observability.env >> "$GITHUB_ENV"

      - name: Stamp build version
        # Write ``api/_build_version.txt`` so ``api.version.get_api_version()``
        # returns the deploy build instead of ``"develop"``. Mirrors the web
        # bundle's ``VITE_APP_VERSION`` injection — both surfaces show a
        # CalVer-ish synthetic version on auto-deploys, the stripped tag on
        # tagged releases (``api-YYYY.MM.MICRO`` → ``YYYY.MM.MICRO``).
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME}" == api-* ]]; then
            VERSION="${GITHUB_REF_NAME#api-}"
          else
            VERSION="$(date -u +%Y.%m.%d).${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          fi
          echo "${VERSION}" > api/_build_version.txt
          echo "Build version: ${VERSION}"

      - name: Wait for compatible frontend deployment
        if: github.event_name == 'push' && github.ref_type == 'branch'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          required_frontend_sha="$(
            git log --first-parent -1 --format=%H "${GITHUB_SHA}" -- \
            web/ \
            frontend_server/ \
            scripts/appinsights_boundary.sh \
            .github/azure-observability.env \
            .github/workflows/deploy-frontend-appservice.yml
          )"
          if [[ -z "${required_frontend_sha}" ]]; then
            echo "No frontend-triggering commit exists in this branch history."
            exit 0
          fi
          echo "Required frontend commit: ${required_frontend_sha}"

          for attempt in {1..60}; do
            git fetch --no-tags origin "${GITHUB_REF_NAME}" >/dev/null
            runs_file="${RUNNER_TEMP}/frontend-runs.json"
            if ! gh api --method GET \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-frontend-appservice.yml/runs" \
              -f per_page=100 \
              --paginate \
              --slurp > "${runs_file}"; then
              echo "Unable to read frontend workflow state (${attempt}/60)."
              sleep 10
              continue
            fi

            # Any active production run can still change the deployed bundle.
            # Wait for the frontend lane to settle before evaluating its
            # live deployed-SHA metadata.
            active_url="$(
              jq -r \
                'first(.[].workflow_runs[] | select(.status != "completed") | .html_url) // empty' \
                "${runs_file}"
            )"
            if [[ -n "${active_url}" ]]; then
              echo "A frontend production deployment is still running: ${active_url}"
              sleep 10
              continue
            fi

            health_payload="$(
              curl --fail --silent --show-error --max-time 10 \
                --header "Cache-Control: no-cache" \
                "https://praxys-frontend.azurewebsites.net/healthz" \
                2>/dev/null || true
            )"
            deployed_sha="$(
              jq -r '.deployed_sha // empty' <<< "${health_payload}" \
                2>/dev/null || true
            )"
            deployed_sha="${deployed_sha//$'\r'/}"
            if [[ ! "${deployed_sha}" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "Live frontend deployment metadata is unavailable (${attempt}/60)."
              sleep 10
              continue
            fi

            if ! git cat-file -e "${deployed_sha}^{commit}" 2>/dev/null; then
              git fetch --no-tags origin "${deployed_sha}" >/dev/null
            fi
            if git merge-base --is-ancestor "${required_frontend_sha}" "${deployed_sha}"; then
              echo "Deployed frontend commit is compatible: ${deployed_sha}"
              exit 0
            fi

            echo "Deployed frontend commit is not yet compatible: ${deployed_sha} (${attempt}/60)."
            sleep 10
          done

          echo "Timed out waiting for a matching or newer frontend deployment." >&2
          exit 1

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Enforce backend telemetry trust boundary
        shell: bash
        run: bash scripts/appinsights_boundary.sh backend-preflight

      - name: Sync App Service settings
        env:
          AZURE_AI_ENDPOINT: ${{ vars.AZURE_AI_ENDPOINT }}
          KEY_VAULT_URL: ${{ vars.KEY_VAULT_URL }}
          KEY_VAULT_KEY_NAME: ${{ vars.KEY_VAULT_KEY_NAME }}
          PRAXYS_JWT_SECRET: ${{ secrets.PRAXYS_JWT_SECRET }}
          # Database (#360). When PRAXYS_DATABASE_URL is set the backend uses
          # PostgreSQL; empty/unset keeps the legacy SQLite file on /home/data,
          # so this can be deployed before the cutover. PRAXYS_DB_AUTH=entra makes
          # the app authenticate with an AAD token from its managed identity (no
          # DB password in app settings). See docs/ops/config-and-secrets.md.
          PRAXYS_DATABASE_URL: ${{ secrets.PRAXYS_DATABASE_URL }}
          PRAXYS_DB_AUTH: ${{ vars.PRAXYS_DB_AUTH }}
          WECHAT_MINIAPP_APPID: ${{ secrets.WECHAT_MINIAPP_APPID }}
          WECHAT_MINIAPP_SECRET: ${{ secrets.WECHAT_MINIAPP_SECRET }}
          # Optional: in-app feedback → GitHub issue auto-filing. Safe to leave
          # unset — the feature stays dormant (feedback is still captured for
          # admin review). NOT added to the required-settings check below.
          PRAXYS_GITHUB_APP_ID: ${{ vars.PRAXYS_GITHUB_APP_ID }}
          PRAXYS_GITHUB_APP_INSTALLATION_ID: ${{ vars.PRAXYS_GITHUB_APP_INSTALLATION_ID }}
          PRAXYS_GITHUB_APP_PRIVATE_KEY: ${{ secrets.PRAXYS_GITHUB_APP_PRIVATE_KEY }}
          PRAXYS_FEEDBACK_GITHUB_REPO: ${{ vars.PRAXYS_FEEDBACK_GITHUB_REPO }}
          PRAXYS_FEEDBACK_GITHUB_LABELS: ${{ vars.PRAXYS_FEEDBACK_GITHUB_LABELS }}
          PRAXYS_FEEDBACK_GITHUB_ASSIGNEES: ${{ vars.PRAXYS_FEEDBACK_GITHUB_ASSIGNEES }}
          PRAXYS_FEEDBACK_AUTOFILE_WITHOUT_AI: ${{ vars.PRAXYS_FEEDBACK_AUTOFILE_WITHOUT_AI }}
          # Feedback screenshot storage (issue #337): keyless Azure Blob via the
          # app's managed identity (granted Storage Blob Data Contributor on the
          # container). Unset → local filesystem fallback under DATA_DIR.
          PRAXYS_FEEDBACK_BLOB_ACCOUNT_URL: ${{ vars.PRAXYS_FEEDBACK_BLOB_ACCOUNT_URL }}
          PRAXYS_FEEDBACK_BLOB_CONTAINER: ${{ vars.PRAXYS_FEEDBACK_BLOB_CONTAINER }}
          # Optional: transactional email (WeCom/Exmail SMTP) for open-registration
          # email verification + emailing waitlist invitation codes. Unset → the
          # feature degrades gracefully (admin copies codes by hand; open sign-ups
          # are created verified because no ownership check is possible). NOT required.
          PRAXYS_SMTP_HOST: ${{ vars.PRAXYS_SMTP_HOST }}
          PRAXYS_SMTP_PORT: ${{ vars.PRAXYS_SMTP_PORT }}
          PRAXYS_SMTP_USER: ${{ vars.PRAXYS_SMTP_USER }}
          PRAXYS_SMTP_PASSWORD: ${{ secrets.PRAXYS_SMTP_PASSWORD }}
          PRAXYS_SMTP_FROM: ${{ vars.PRAXYS_SMTP_FROM }}
          PRAXYS_SMTP_STARTTLS: ${{ vars.PRAXYS_SMTP_STARTTLS }}
          # Public origin used to build verify/invite links in those emails
          # (default https://praxys.run when unset).
          PRAXYS_APP_BASE_URL: ${{ vars.PRAXYS_APP_BASE_URL }}
        run: |
          for var in AZURE_AI_ENDPOINT KEY_VAULT_URL KEY_VAULT_KEY_NAME \
                     APPLICATIONINSIGHTS_CONNECTION_STRING BACKEND_APPINSIGHTS_RESOURCE_ID \
                     PRAXYS_JWT_SECRET \
                     WECHAT_MINIAPP_APPID WECHAT_MINIAPP_SECRET; do
            if [[ -z "${!var}" ]]; then
              echo "ERROR: required setting '${var}' is empty or undefined" >&2
              exit 1
            fi
          done
          az webapp config appsettings set \
            --name trainsight-app \
            --resource-group rg-trainsight \
            --settings \
              AZURE_AI_ENDPOINT="${AZURE_AI_ENDPOINT}" \
              KEY_VAULT_URL="${KEY_VAULT_URL}" \
              KEY_VAULT_KEY_NAME="${KEY_VAULT_KEY_NAME}" \
              PRAXYS_JWT_SECRET="${PRAXYS_JWT_SECRET}" \
              PRAXYS_DATABASE_URL="${PRAXYS_DATABASE_URL}" \
              PRAXYS_DB_AUTH="${PRAXYS_DB_AUTH}" \
              WECHAT_MINIAPP_APPID="${WECHAT_MINIAPP_APPID}" \
              WECHAT_MINIAPP_SECRET="${WECHAT_MINIAPP_SECRET}" \
              PRAXYS_GITHUB_APP_ID="${PRAXYS_GITHUB_APP_ID}" \
              PRAXYS_GITHUB_APP_INSTALLATION_ID="${PRAXYS_GITHUB_APP_INSTALLATION_ID}" \
              PRAXYS_GITHUB_APP_PRIVATE_KEY="${PRAXYS_GITHUB_APP_PRIVATE_KEY}" \
              PRAXYS_FEEDBACK_GITHUB_REPO="${PRAXYS_FEEDBACK_GITHUB_REPO}" \
              PRAXYS_FEEDBACK_GITHUB_LABELS="${PRAXYS_FEEDBACK_GITHUB_LABELS}" \
              PRAXYS_FEEDBACK_GITHUB_ASSIGNEES="${PRAXYS_FEEDBACK_GITHUB_ASSIGNEES}" \
              PRAXYS_FEEDBACK_AUTOFILE_WITHOUT_AI="${PRAXYS_FEEDBACK_AUTOFILE_WITHOUT_AI}" \
              PRAXYS_FEEDBACK_BLOB_ACCOUNT_URL="${PRAXYS_FEEDBACK_BLOB_ACCOUNT_URL}" \
              PRAXYS_FEEDBACK_BLOB_CONTAINER="${PRAXYS_FEEDBACK_BLOB_CONTAINER}" \
              PRAXYS_SMTP_HOST="${PRAXYS_SMTP_HOST}" \
              PRAXYS_SMTP_PORT="${PRAXYS_SMTP_PORT}" \
              PRAXYS_SMTP_USER="${PRAXYS_SMTP_USER}" \
              PRAXYS_SMTP_PASSWORD="${PRAXYS_SMTP_PASSWORD}" \
              PRAXYS_SMTP_FROM="${PRAXYS_SMTP_FROM}" \
              PRAXYS_SMTP_STARTTLS="${PRAXYS_SMTP_STARTTLS}" \
              PRAXYS_APP_BASE_URL="${PRAXYS_APP_BASE_URL}" \
              WEBSITES_PORT="8000" \
              DATA_DIR="/home/data" \
              SCM_DO_BUILD_DURING_DEPLOYMENT="true" \
              WEBSITE_HTTPLOGGING_RETENTION_DAYS="3" \
            --output none

          # Always On keeps ONE warm container instead of stop/starting on idle.
          # Each recycle abandons the backend's DB connection pool as idle
          # "zombie" Postgres backends (they linger until TCP-keepalive reap);
          # that churn helped exhaust the Burstable server in the 2026-07-05
          # outage. Site config, NOT an app setting -> a separate command. See
          # docs/ops/config-and-secrets.md.
          az webapp config set \
            --name trainsight-app \
            --resource-group rg-trainsight \
            --always-on true

      - name: Cut over backend telemetry and alerts
        shell: bash
        run: bash scripts/appinsights_boundary.sh backend-cutover

      - name: Wait for App Service deployment endpoint to settle
        timeout-minutes: 8
        shell: bash
        run: |
          set -euo pipefail
          # App-setting and site-config writes recycle the SCM container.
          # Starting ZipDeploy during that recycle aborts the deployment.
          sleep 90
          stable_probes=0
          for attempt in {1..12}; do
            deployment_id=""
            if deployment_id="$(timeout 20s az webapp log deployment list \
              --name trainsight-app \
              --resource-group rg-trainsight \
              --query "[0].id" \
              -o tsv 2>/dev/null)" &&
              [[ -n "${deployment_id}" ]]; then
              stable_probes=$((stable_probes + 1))
              if (( stable_probes >= 3 )); then
                echo "App Service deployment endpoint is stable."
                exit 0
              fi
            else
              stable_probes=0
            fi
            echo "Waiting for App Service deployment endpoint (${attempt}/12)."
            sleep 10
          done
          echo "App Service deployment endpoint did not stabilize." >&2
          exit 1

      # NB: no pre-deploy on-demand DB snapshot. praxys-pg is a Burstable-tier
      # Flexible Server, which does not support customer on-demand backups; the
      # server's continuous PITR (14-day) provides the pre-deploy restore point
      # (restore to the instant before the deploy). See docs/ops/backup-and-restore.md.

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: trainsight-app
          resource-group-name: rg-trainsight
